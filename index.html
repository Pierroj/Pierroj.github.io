<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickleball Matchmaker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 dark:bg-gray-900 p-4 sm:p-6 min-h-screen transition-colors duration-300">

    <div class="max-w-[1400px] mx-auto">
        
        <div class="no-print flex flex-col sm:flex-row items-center justify-between gap-4 mb-8">
            <div class="hidden sm:flex sm:w-1/3"></div>

            <h1 class="text-3xl md:text-4xl font-bold text-center text-green-600 dark:text-green-500 font-prompt shrink-0">
                ระบบจัดคู่ Pickleball
            </h1>

            <div class="flex items-center justify-center sm:justify-end gap-2 sm:w-1/3">
                <span class="text-sm text-yellow-500 dark:text-gray-500 transition-colors">☀️</span>
                <button onclick="toggleDarkMode()" class="relative inline-flex h-6 w-11 shrink-0 cursor-pointer items-center rounded-full bg-gray-300 dark:bg-green-500 transition-colors duration-300 focus:outline-none shadow-inner">
                    <span class="inline-block h-4 w-4 transform rounded-full bg-white shadow-md transition-transform duration-300 translate-x-1 dark:translate-x-6"></span>
                </button>
                <span class="text-sm text-gray-400 dark:text-yellow-300 transition-colors">🌙</span>
            </div>
        </div>

        <div id="mainLayout" class="flex flex-col items-center gap-6 transition-all duration-500">

            <div id="leftColumn" class="w-full max-w-2xl shrink-0 space-y-6 no-print transition-all duration-500">
                
                <div class="bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 transition-colors">
                    <div class="mb-8">
                        <h2 class="font-bold mb-4 font-prompt text-xl text-gray-800 dark:text-gray-100 flex items-center gap-2">
                            <span class="bg-green-100 dark:bg-green-900 text-green-600 dark:text-green-400 w-8 h-8 rounded-full flex items-center justify-center text-sm">1</span>
                            เพิ่มรายชื่อผู้เล่น
                        </h2>
                        
                        <div class="flex flex-col gap-3 mb-4">
                            <input type="text" id="playerName" placeholder="พิมพ์ชื่อผู้เล่น..." class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white p-3.5 text-lg rounded-xl w-full outline-none focus:border-green-500 dark:focus:border-green-400 focus:ring-2 focus:ring-green-500 transition shadow-inner dark:shadow-none">
                            <div class="flex justify-between items-center bg-gray-50 dark:bg-gray-700/50 p-2.5 rounded-xl border border-gray-100 dark:border-gray-600">
                                <label class="flex items-center gap-2 whitespace-nowrap cursor-pointer group ml-2">
                                    <input type="checkbox" id="isBeginner" class="w-5 h-5 sm:w-6 sm:h-6 text-green-600 dark:text-green-500 rounded bg-white dark:bg-gray-600 border-gray-300 dark:border-gray-500">
                                    <span class="text-sm sm:text-base font-medium text-gray-600 dark:text-gray-300 group-hover:text-gray-800 dark:group-hover:text-white">มือใหม่ (Beginner)</span>
                                </label>
                                <button onclick="addPlayer()" class="bg-blue-600 dark:bg-blue-500 text-white px-6 py-2.5 sm:px-8 sm:py-3 text-base sm:text-lg rounded-lg hover:bg-blue-700 dark:hover:bg-blue-600 font-prompt shadow-md transition active:scale-95">เพิ่ม</button>
                            </div>
                        </div>
                        <ul id="playerList" class="flex flex-wrap gap-2"></ul>
                    </div>

                    <div class="mb-8 pt-6 border-t border-gray-100 dark:border-gray-700">
                        <h2 class="font-bold mb-4 font-prompt text-xl text-gray-800 dark:text-gray-100 flex items-center gap-2">
                            <span class="bg-green-100 dark:bg-green-900 text-green-600 dark:text-green-400 w-8 h-8 rounded-full flex items-center justify-center text-sm">2</span>
                            ตั้งค่าแมตช์
                        </h2>
                        <div class="flex flex-col gap-3">
                            <div class="flex justify-between items-center bg-gray-50 dark:bg-gray-700/50 p-4 rounded-xl border border-gray-200 dark:border-gray-600">
                                <label class="text-sm md:text-base font-medium text-gray-700 dark:text-gray-300">จำนวนเกมทั้งหมดที่จะเล่น:</label>
                                <input type="number" id="totalGames" min="1" value="10" class="border border-gray-300 dark:border-gray-500 bg-white dark:bg-gray-600 dark:text-white p-2 md:p-2.5 rounded-lg w-20 text-center outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500 font-bold text-lg">
                            </div>
                            <label class="flex items-center gap-3 cursor-pointer bg-gray-50 dark:bg-gray-700/50 p-4 rounded-xl border border-gray-200 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <input type="checkbox" id="preventBeginner" checked class="w-5 h-5 text-green-600 dark:text-green-500 rounded bg-white dark:bg-gray-600 border-gray-300 dark:border-gray-500">
                                <span class="text-sm md:text-base font-medium text-gray-700 dark:text-gray-300">ห้ามผู้เล่น "มือใหม่" จับคู่กันเอง</span>
                            </label>
                            
                            <label class="flex items-center gap-3 cursor-pointer bg-white dark:bg-gray-700/30 p-4 rounded-xl border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                <input type="checkbox" id="enableScoreTable" checked class="w-5 h-5 text-green-600 dark:text-green-500 rounded bg-white dark:bg-gray-600 border-gray-300 dark:border-gray-500 focus:ring-green-500">
                                <span class="text-sm md:text-base font-medium text-gray-600 dark:text-gray-400">สร้างตารางบันทึกคะแนนด้วย <span class="text-xs text-red-500 font-normal">(ปิดอัตโนมัติหากเกิน 20 เกม หรือ 10 คน)</span></span>
                            </label>
                        </div>
                    </div>

                    <button onclick="generateMatches()" class="w-full bg-green-600 dark:bg-green-500 text-white font-bold py-4 rounded-xl hover:bg-green-700 dark:hover:bg-green-600 transition font-prompt text-lg shadow-md active:scale-95 flex justify-center items-center gap-2">
                        🚀 เริ่มจับคู่จัดตาราง
                    </button>
                </div>

                <div id="statsSection" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 hidden transition-colors">
                    <h3 class="font-bold mb-3 font-prompt text-gray-800 dark:text-gray-100 text-xl border-b border-gray-200 dark:border-gray-700 pb-2">📊 สรุปสถิติผู้เล่น</h3>
                    <ul id="stats" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-2 text-sm"></ul>
                </div>

                <div id="matchListAnchorLeft">
                    <div id="matchListSection" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 hidden transition-colors">
                        
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 border-b border-gray-200 dark:border-gray-700 pb-3 gap-3">
                            <h2 class="text-xl font-bold font-prompt text-gray-800 dark:text-gray-100">📋 ลำดับการแข่งขัน</h2>
                            <div class="flex gap-2 w-full sm:w-auto">
                                <button onclick="saveMatchListImage()" class="flex-1 sm:flex-none bg-blue-600 dark:bg-blue-500 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-blue-700 shadow-sm transition">🖼️ เซฟรูป</button>
                                <button onclick="saveMatchListPDF()" class="flex-1 sm:flex-none bg-red-600 dark:bg-red-500 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-red-700 shadow-sm transition">📄 PDF</button>
                            </div>
                        </div>

                        <div id="matches" class="space-y-4"></div>
                    </div>
                </div>

            </div>

            <div id="rightColumn" class="w-full lg:flex-1 hidden flex-col gap-6 transition-all duration-500">
                
                <div id="matchListAnchorRight"></div>

                <div id="canvasSection" class="bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 lg:sticky lg:top-6 lg:max-h-[calc(100vh-3rem)] lg:overflow-y-auto custom-scrollbar transition-colors">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-5 no-print gap-4">
                        <h2 class="text-2xl font-bold font-prompt text-gray-800 dark:text-gray-100">ตารางบันทึกคะแนน</h2>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <button onclick="saveScoreTableImage()" class="flex-1 sm:flex-none bg-blue-600 dark:bg-blue-500 text-white px-4 py-2.5 rounded-xl text-sm hover:bg-blue-700 shadow-sm flex justify-center items-center gap-1 transition">🖼️ เซฟรูป</button>
                            <button onclick="saveScoreTablePDF()" class="flex-1 sm:flex-none bg-red-600 dark:bg-red-500 text-white px-4 py-2.5 rounded-xl text-sm hover:bg-red-700 shadow-sm flex justify-center items-center gap-1 transition">📄 PDF</button>
                            <button onclick="window.print()" class="flex-1 sm:flex-none bg-gray-800 dark:bg-gray-600 text-white px-4 py-2.5 rounded-xl text-sm hover:bg-black shadow-sm flex justify-center items-center gap-1 transition">🖨️ พิมพ์</button>
                        </div>
                    </div>
                    <div class="overflow-hidden flex justify-center bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl p-2 md:p-4">
                        <canvas id="scoreCanvas" class="max-w-full h-auto shadow-sm rounded bg-white"></canvas>
                    </div>
                    <p class="text-center text-xs text-gray-400 dark:text-gray-500 mt-4 no-print">* หากดูในมือถือ ภาพจะถูกย่อขนาด กรุณากดเซฟเพื่อดูความละเอียดเต็ม</p>
                </div>
            </div>

        </div>
    </div>

    <canvas id="matchListCanvas" class="hidden"></canvas>

    <script src="script.js"></script>
</body>
</html>
